<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Brand blue background -->
  <rect width="512" height="512" rx="88" fill="#1F3864"/>
  <!-- Subtle horizontal rule above subtitle -->
  <rect x="80" y="348" width="352" height="5" rx="2.5" fill="#4A7FB5" opacity="0.7"/>
  <!-- MVS monogram -->
  <text x="256" y="320"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="204"
        font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle">MVS</text>
  <!-- PARTS subtitle -->
  <text x="256" y="400"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="600"
        fill="#D6E4F0"
        text-anchor="middle"
        letter-spacing="12">PARTS</text>
</svg>
