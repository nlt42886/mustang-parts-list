// ── Build clickable description ───────────────────────────────────────────────
// Known manufacturer/brand names to extract from descriptions
const mfgNames = [
  "A-B","Allen-Bradley","Phoenix","Sola","Advantech","Parker","SSD","Eurotherm",
  "Advanced Energy","AE","Dart","TRUMPF","Hüttinger","Huttinger","TruPlasma",
  "Acme","Powertran","MKS","Eyesys","ConvecTorr","Granville Phillips","Stabil",
  "Omega","Leybold","Inficon","Schmersal","Omron","Watlow","Wago",
  "Edwards","Oerlikon","Stokes","Polycold","Baldor","SMC","Dayton","Magnatrol",
  "Watts","Wilkerson","Hoffman","Turck","Mitsubishi","Copley","LS Electric",
  "TRD","Gems"
];

// Model/series identifiers to look for
const modelPatterns = /\b(SLC\s*5\/05|690\+|PE\s*II\s*10K|DC\s*3030|1100\s*HC|FV105-T|PS113A|MMS-32H|CMS-32H|FHA-17C|1150C|1179A|275|347D|Series\s*\d+|Type\s*K)\b/gi;

function extractSearchKeywords(desc, pn) {
  let keywords = [];
  
  // Add part number if valid
  if (pn && pn !== "Not listed" && pn !== "—") {
    keywords.push(pn);
  }
  
  // Find manufacturer names in description
  for (const mfg of mfgNames) {
    if (desc.toLowerCase().includes(mfg.toLowerCase())) {
      keywords.push(mfg);
      break; // One manufacturer is enough
    }
  }
  
  // Find model/series numbers
  const modelMatch = desc.match(modelPatterns);
  if (modelMatch) {
    keywords.push(modelMatch[0]);
  }
  
  // If we still only have the PN, grab the first 3-4 meaningful words
  if (keywords.length <= 1) {
    const cleaned = desc
      .replace(/\(.*?\)/g, '')           // Remove parentheticals
      .replace(/—.*/, '')                 // Remove everything after em dash
      .replace(/\b(x\d+)\b/gi, '')       // Remove quantity markers
      .replace(/\b(Slot\s*\d+|D\d+\/\d+)\b/gi, '') // Remove slot refs
      .replace(/\b\d+["']\b/g, '')       // Remove dimensions like 6" 54"
      .replace(/\b(for|the|on|in|with|and|or|to)\b/gi, '') // Remove filler words
      .trim();
    const words = cleaned.split(/\s+/).filter(w => w.length > 1).slice(0, 4);
    keywords.push(...words);
  }
  
  return keywords.join(' ');
}

function descHtml(desc, pn) {
  const searchText = extractSearchKeywords(desc, pn);
  const q = encodeURIComponent(searchText);
  return `<a class="desc-link" href="https://www.google.com/search?q=${q}" target="_blank">${desc}</a>`;
}

// ── Build clickable part number ───────────────────────────────────────────────
function pnHtml(pn, desc) {
  if (pn === "Not listed" || pn === "—") {
    return `<span class="not-listed">${pn}</span>`;
  }
  const q = encodeURIComponent(pn);
  return `<a class="pn-link" href="https://www.google.com/search?q=${q}" target="_blank" title="Google search: ${pn}">${pn}</a>`;
}

// ── GROUPING LOGIC ──────────────────────────────────────────────────────────
// Groups rows with same PN into one row, EXCEPT PLC / Network stays expanded
// Uses first description only, merges all schematic refs
function groupData(rows) {
  const grouped = [];
  const pnMap = new Map();

  for (const row of rows) {
    const [ref, cat, desc, pn] = row;

    // Never group PLC / Network — slot info is critical per-row
    if (cat === "PLC / Network") {
      grouped.push([ref, cat, desc, pn]);
      continue;
    }

    // Don't group "Not listed" or "—" part numbers
    if (pn === "Not listed" || pn === "—") {
      grouped.push([ref, cat, desc, pn]);
      continue;
    }

    // Check if we already have this PN in the same category
    const key = pn + "||" + cat;
    if (pnMap.has(key)) {
      const idx = pnMap.get(key);
      const existing = grouped[idx];
      // Merge schematic refs only
      if (ref !== "—" && !existing[0].includes(ref)) {
        existing[0] = existing[0] === "—" ? ref : existing[0] + ", " + ref;
      }
    } else {
      grouped.push([ref, cat, desc, pn]);
      pnMap.set(key, grouped.length - 1);
    }
  }

  return grouped;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let sortCol = 3, sortAsc = true;
let filterCat = "";

// ── SORT ─────────────────────────────────────────────────────────────────────
function naturalSort(a, b) {
  const ax=[], bx=[];
  a.replace(/(\d+)|(\D+)/g, (_,d,s) => ax.push([d||Infinity, s||""]));
  b.replace(/(\d+)|(\D+)/g, (_,d,s) => bx.push([d||Infinity, s||""]));
  for (let i=0; i<Math.max(ax.length,bx.length); i++) {
    const ai=ax[i]||[Infinity,""], bi=bx[i]||[Infinity,""];
    if (ai[1]!==bi[1]) return ai[1].localeCompare(bi[1]);
    if (+ai[0]!==+bi[0]) return +ai[0] - +bi[0];
  }
  return 0;
}

function sortTable(col) {
  sortAsc = (sortCol===col) ? !sortAsc : true;
  sortCol = col;
  document.querySelectorAll("thead th[data-col]").forEach(th => {
    const c = parseInt(th.dataset.col);
    th.classList.toggle("sorted", c===col);
    th.querySelector(".sort-arrow").textContent = (c===col && !sortAsc) ? "▼" : "▲";
  });
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const processedData = groupData(data);

  let rows = processedData.filter(r => {
    const [ref, cat, desc, pn] = r;
    if (q && !([ref,cat,desc,pn].join(" ").toLowerCase().includes(q))) return false;
    if (filterCat && cat!==filterCat) return false;
    return true;
  });

  rows.sort((a,b) => {
    const av = a[sortCol].toLowerCase(), bv = b[sortCol].toLowerCase();
    const aNL = av==="not listed", bNL = bv==="not listed";
    if (aNL && !bNL) return 1;
    if (!aNL && bNL) return -1;
    const aDash = a[0] === "—", bDash = b[0] === "—";
    if (aDash && !bDash) return 1;
    if (!aDash && bDash) return -1;
    const res = naturalSort(av, bv);
    return sortAsc ? res : -res;
  });

  document.getElementById("tbody").innerHTML = rows.map(r => {
    return `<tr>
      <td>${pnHtml(r[3], r[2])}</td>
      <td>${badgeHtml(r[1])}</td>
      <td>${descHtml(r[2], r[3])}</td>
      <td class="ref-cell">${r[0]}</td>
    </tr>`;
  }).join("");

  document.getElementById("count").textContent = `${rows.length} of ${processedData.length} components`;
  document.getElementById("noResults").style.display = rows.length===0 ? "block" : "none";
}

// ── WORD DOC EXPORT ──────────────────────────────────────────────────────────
// Generates a formatted .docx with proper table, wrapped text, sized columns
let docxLibLoaded = false;
function loadDocxLib() {
  return new Promise((resolve, reject) => {
    if (docxLibLoaded) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js';
    s.onload = () => { docxLibLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Failed to load docx library'));
    document.head.appendChild(s);
  });
}

async function exportCSV() {
  try {
    await loadDocxLib();
  } catch(e) {
    alert('Could not load export library. Check your internet connection.');

  }

  const q = document.getElementById("search").value.toLowerCase();
  const processedData = groupData(data);

    if (filterCat && cat!==filterCat) return false;

  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
          AlignmentType, WidthType, ShadingType, BorderStyle, HeadingLevel,
          VerticalAlign, PageOrientation } = docx;

  const border = { style: BorderStyle.SINGLE, size: 1, color: "D6E4F0" };
  const borders = { top: border, bottom: border, left: border, right: border };
  const cellMargins = { top: 60, bottom: 60, left: 100, right: 100 };

  // Header row
  const headerCells = ["Part Number", "Category", "Description", "Schematic Ref"].map(text =>
    new TableCell({

      width: { size: text === "Description" ? 4800 : text === "Schematic Ref" ? 2200 : text === "Part Number" ? 1800 : 1300, type: WidthType.DXA },
      shading: { fill: "1F3864", type: ShadingType.CLEAR },
      margins: cellMargins,
      verticalAlign: VerticalAlign.CENTER,
      children: [new Paragraph({ alignment: AlignmentType.LEFT,
        children: [new TextRun({ text, bold: true, color: "FFFFFF", font: "Arial", size: 20 })] })]
    })
  );

  // Data rows
  const dataRows = rows.map((r, idx) => {
    const fill = idx % 2 === 0 ? "FFFFFF" : "F2F2F2";
    const cellData = [
      { text: r[3], width: 1800, bold: true, color: r[3] === "Not listed" || r[3] === "—" ? "BBBBBB" : "2E74B5", font: "Consolas" },
      { text: r[1], width: 1300, bold: false, color: "333333", font: "Arial" },
      { text: r[2], width: 4800, bold: false, color: "333333", font: "Arial" },
      { text: r[0], width: 2200, bold: true, color: "1F3864", font: "Arial" },
    ];
    return new TableRow({
      children: cellData.map(c =>
        new TableCell({
          borders,
          width: { size: c.width, type: WidthType.DXA },
          shading: { fill, type: ShadingType.CLEAR },
          margins: cellMargins,
          verticalAlign: VerticalAlign.CENTER,
          children: [new Paragraph({
            children: [new TextRun({ text: c.text, bold: c.bold, color: c.color, font: c.font, size: 18 })]
          })]
        })
      )
    });
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 15840, height: 12240, orientation: PageOrientation.LANDSCAPE },
          margin: { top: 720, right: 720, bottom: 720, left: 720 }
        }
      },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 200 },
          children: [new TextRun({ text: "MUSTANG VACUUM SYSTEMS — PARTS LIST", bold: true, font: "Arial", size: 28, color: "1F3864" })]
        }),
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 300 },
          children: [new TextRun({ text: "Colt 48 / Colt® 4828  ·  Electrical & Mechanical Components", font: "Arial", size: 20, color: "666666" })]
        }),
        new Table({
          width: { size: 10100, type: WidthType.DXA },
          columnWidths: [1800, 1300, 4800, 2200],
          rows: [
            new TableRow({ children: headerCells }),
            ...dataRows
          ]
        }),
        new Paragraph({
          spacing: { before: 200 },
          children: [new TextRun({ text: `${rows.length} components`, font: "Arial", size: 16, color: "999999", italics: true })]
        })
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Mustang_Parts_List.docx";
  a.click();
  URL.revokeObjectURL(url);
}

// ── CATEGORY PILLS ───────────────────────────────────────────────────────────
function buildLegend() {
  const cats = [...new Set(data.map(r=>r[1]))].sort();
  const legend = document.getElementById("catLegend");
  const all = document.createElement("span");
  all.className = "cat-pill active";
  all.style.background = "#1F3864";
  all.style.color = "#fff";
  all.textContent = "All";
  all.dataset.cat = "";
  all.onclick = () => selectPill(all, "");
  legend.appendChild(all);

  cats.forEach(cat => {
    const s = catStyles[cat] || { bg:"#F3F4F6", color:"#374151" };
    const pill = document.createElement("span");
    pill.className = "cat-pill";
    pill.style.background = s.bg;
    pill.style.color = s.color;
    pill.textContent = cat;
    pill.dataset.cat = cat;
    pill.onclick = () => selectPill(pill, cat);
    legend.appendChild(pill);
  });
}

function selectPill(el, cat) {
  document.querySelectorAll(".cat-pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  filterCat = cat;
  render();
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", render);

buildLegend();
render();

// ── CHECK FOR UPDATES ─────────────────────────────────────────────────────────
async function checkForUpdates() {
  if (confirm('This will refresh the app and pull the latest version. Continue?')) {
    try {
      // Unregister all service workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const reg of registrations) {
          await reg.unregister();
        }
      }
      // Clear only this app's caches
      if ('caches' in window) {
        const names = await caches.keys();
        for (const name of names) {
          if (name.startsWith('mvs-parts')) {
            await caches.delete(name);
          }
        }
      }
      // Hard reload — bypass cache
      window.location.reload(true);
    } catch (e) {
      window.location.reload(true);
    }
  }
}

  e.preventDefault();

  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = '';
});
